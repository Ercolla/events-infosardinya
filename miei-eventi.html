<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miei Eventi - Events InfoSardinya</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="auth.js"></script>
    <script src="navbar.js"></script>
    <script src="supabaseClient.js"></script>

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --color-primary: #151515;
            --color-accent-red: #FF2122;
        }

        .event-item {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .event-item:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .event-image {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 0.375rem;
            flex-shrink: 0;
        }

        .event-info {
            flex: 1;
        }

        .event-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
        }

        .event-meta {
            display: flex;
            gap: 2rem;
            margin-bottom: 1rem;
            color: #686868;
            font-size: 0.875rem;
        }

        .event-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .event-badge {
            display: inline-block;
            background: var(--color-accent-red);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .event-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: none;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-view {
            background: #0077B6;
            color: white;
            text-decoration: none;
        }

        .btn-view:hover {
            background: #005fa3;
        }

        .btn-edit {
            background: var(--color-accent-red);
            color: white;
            text-decoration: none;
        }

        .btn-edit:hover {
            background: #e01f20;
        }

        .btn-delete {
            background: #f0f0f0;
            color: var(--color-primary);
            border: 1px solid #ddd;
        }

        .btn-delete:hover {
            background: #fee;
            border-color: var(--color-accent-red);
            color: var(--color-accent-red);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-text {
            font-size: 1.125rem;
            color: #686868;
            margin-bottom: 2rem;
        }

        .btn-primary {
            background: var(--color-accent-red);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #e01f20;
            transform: translateY(-2px);
        }

        .alert-success {
            background: #efe;
            border: 1px solid #cfc;
            color: #0a0;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .event-item {
                flex-direction: column;
            }

            .event-image {
                width: 100%;
                height: 200px;
            }

            .event-meta {
                flex-direction: column;
                gap: 0.5rem;
            }

            .event-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="bg-gray-50">

    <div id="site-navbar"></div>

    <script>
        // Guard: redirect se non autenticato
        authRequireLogin('login.html?redirect=miei-eventi.html');
    </script>

    <!-- PAGE CONTENT -->
    <section class="py-12 md:py-16">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-gray-900">I Miei Eventi</h1>
                <a href="crea-evento.html" class="btn-primary">+ Nuovo Evento</a>
            </div>

            <!-- Alert creazione evento -->
            <div id="created-alert" class="hidden alert-success">
                ✓ Evento creato con successo!
            </div>

            <!-- Lista eventi -->
            <div id="events-container">
                <!-- Gli eventi verranno caricati qui con JavaScript -->
            </div>

        </div>
    </section>

    <script>
        var user = authGetCurrentUser();
        var container = document.getElementById('events-container');
        var createdAlert = document.getElementById('created-alert');

        // Mostra alert se evento è stato appena creato
        var params = new URLSearchParams(window.location.search);
        if (params.get('created') === '1') {
            createdAlert.classList.remove('hidden');
            setTimeout(function() { createdAlert.classList.add('hidden'); }, 5000);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Carica gli eventi dell'utente (da localStorage + dati freschi da Supabase)
        async function loadUserEvents() {
            // Prendi gli eventi dell'utente dal localStorage (contiene gli ID Supabase)
            var localEvents = eventiGetByUser(user.id);

            if (localEvents.length === 0) {
                container.innerHTML = '<div class="bg-white rounded-lg shadow-lg p-8">' +
                    '<div class="empty-state">' +
                    '<div class="empty-icon">📭</div>' +
                    '<p class="empty-text">Non hai ancora pubblicato nessun evento.</p>' +
                    '<a href="crea-evento.html" class="btn-primary">Crea il tuo primo evento</a>' +
                    '</div></div>';
                return;
            }

            // Per ogni evento locale, prova a caricare i dati aggiornati da Supabase
            var supabaseIds = localEvents
                .filter(function(e) { return e.supabaseId || (typeof e.id === 'number'); })
                .map(function(e) { return e.supabaseId || e.id; });

            var supabaseEvents = {};
            if (supabaseIds.length > 0) {
                try {
                    var { data } = await supabaseClient
                        .from('events')
                        .select('*')
                        .in('id', supabaseIds);
                    if (data) {
                        data.forEach(function(e) { supabaseEvents[e.id] = e; });
                    }
                } catch (err) {
                    console.error('Errore caricamento da Supabase:', err);
                }
            }

            var html = '';
            localEvents.forEach(function(evento) {
                // Usa dati Supabase se disponibili, altrimenti fallback su localStorage
                var sbId = evento.supabaseId || evento.id;
                var sb = supabaseEvents[sbId];

                var titolo = sb ? sb.title : (evento.titolo || '');
                var data = sb ? sb.date : (evento.dataInizio || '');
                var loc = sb ? sb.location : (evento.location || '');
                var badge = sb ? sb.badge_text : (evento.categoria || '').toUpperCase();
                var img = sb ? sb.image : (evento.immagineUrl || 'img/spettacoli.jpg');
                var desc = sb ? (sb.description || '') : (evento.descrizione || '');
                var eventId = sb ? sb.id : evento.id;

                var dateEnd = sb ? sb.date_end : (evento.dataFine || '');
                var dataFormatted = '';
                if (data) {
                    var d = new Date(data + 'T00:00:00');
                    dataFormatted = d.toLocaleDateString('it-IT');
                    if (dateEnd && dateEnd !== data) {
                        var d2 = new Date(dateEnd + 'T00:00:00');
                        dataFormatted = 'Dal ' + dataFormatted + ' al ' + d2.toLocaleDateString('it-IT');
                    }
                }

                html += '<div class="event-item">' +
                    '<img src="' + img + '" alt="' + titolo + '" class="event-image">' +
                    '<div class="event-info">' +
                    '<span class="event-badge">' + badge + '</span>' +
                    '<h2 class="event-title">' + titolo + '</h2>' +
                    '<div class="event-meta">' +
                    '<div class="event-meta-item">📅 ' + dataFormatted + '</div>' +
                    '<div class="event-meta-item">📍 ' + loc + '</div>' +
                    '</div>' +
                    '<p class="text-gray-600 text-sm mb-4">' + desc.substring(0, 150) + (desc.length > 150 ? '...' : '') + '</p>' +
                    '<div class="event-actions">' +
                    '<a href="dettaglio-evento.html?id=' + eventId + '" class="btn-action btn-view">Visualizza</a>' +
                    '<a href="modifica-evento.html?id=' + eventId + '&localId=' + encodeURIComponent(evento.id) + '" class="btn-action btn-edit">Modifica</a>' +
                    '<button onclick="deleteEvent(\'' + evento.id + '\', ' + (sbId || 'null') + ')" class="btn-action btn-delete">Cancella</button>' +
                    '</div></div></div>';
            });

            container.innerHTML = html;
        }

        // Cancella un evento (da localStorage e da Supabase)
        async function deleteEvent(localId, supabaseId) {
            if (!confirm('Sei sicuro di voler cancellare questo evento?')) return;

            // Rimuovi da localStorage
            var result = eventiDelete(localId);

            // Rimuovi anche da Supabase se ha un ID
            if (supabaseId) {
                try {
                    await supabaseClient.from('events').delete().eq('id', supabaseId);
                } catch (err) {
                    console.error('Errore cancellazione da Supabase:', err);
                }
            }

            loadUserEvents();
        }

        // Carica gli eventi al caricamento della pagina
        loadUserEvents();
    </script>

</body>
</html>
