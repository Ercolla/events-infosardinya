<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupera Password - Events InfoSardinya</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Poppins', sans-serif; }

        /* Evita scroll orizzontale su mobile */
        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }

        :root {
            --color-primary: #151515;
            --color-accent-red: #FF2122;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.375rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent-red);
            box-shadow: 0 0 0 3px rgba(255, 33, 34, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--color-accent-red);
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #e01f20;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 33, 34, 0.3);
        }

        .submit-btn:disabled {
            background: #aaa;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div id="site-navbar"></div>

    <section class="min-h-[calc(100vh-80px)] flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-lg shadow-lg p-8">

                <!-- Icona -->
                <div class="text-center mb-6">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 rounded-full mb-4">
                        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">Recupera Password</h1>
                    <p class="text-sm text-gray-600">Inserisci la tua email e ti invieremo un link per reimpostare la password.</p>
                </div>

                <!-- Form richiesta reset -->
                <form id="reset-form">
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="reset-email" required
                               class="form-input" placeholder="tua@email.com">
                    </div>

                    <!-- Messaggi -->
                    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded"></div>
                    <div id="success-msg" class="hidden mb-4 p-4 bg-green-50 border border-green-200 text-green-700 text-sm rounded"></div>

                    <button type="submit" id="submit-btn" class="submit-btn">Invia Link di Recupero</button>
                </form>

                <!-- Torna al login -->
                <div class="text-center mt-6">
                    <a href="login.html" class="text-sm text-gray-600 hover:text-red-500 font-medium transition">
                        &larr; Torna al Login
                    </a>
                </div>

            </div>
        </div>
    </section>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="auth.js"></script>
    <script src="navbar.js"></script>

    <script>
        document.getElementById('reset-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            var email = document.getElementById('reset-email').value.trim();
            var errorMsg = document.getElementById('error-msg');
            var successMsg = document.getElementById('success-msg');
            var submitBtn = document.getElementById('submit-btn');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (!email) {
                errorMsg.textContent = 'Inserisci il tuo indirizzo email.';
                errorMsg.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Invio in corso...';

            try {
                var result = await authResetPassword(email);

                if (result.ok) {
                    successMsg.innerHTML = '<strong>Email inviata!</strong><br>Controlla la tua casella di posta (anche lo spam). Clicca sul link ricevuto per reimpostare la password.';
                    successMsg.classList.remove('hidden');
                    document.getElementById('reset-form').querySelector('div:first-child').style.display = 'none';
                    submitBtn.style.display = 'none';
                } else {
                    errorMsg.textContent = result.error;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Si e verificato un errore imprevisto. Riprova.';
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Invia Link di Recupero';
            }
        });
    </script>

    <!-- Cookie Banner GDPR -->
    <script src="cookie-banner.js"></script>

</body>
</html>
