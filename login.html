<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Events InfoSardinya</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="auth.js"></script>
    <script src="navbar.js"></script>

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --color-primary: #151515;
            --color-accent-red: #FF2122;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.375rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent-red);
            box-shadow: 0 0 0 3px rgba(255, 33, 34, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--color-accent-red);
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #e01f20;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 33, 34, 0.3);
        }
    </style>
</head>
<body class="bg-gray-50">

    <div id="site-navbar"></div>

    <script>
        authRedirectIfLoggedIn('index.html');
    </script>

    <!-- PAGE CONTAINER -->
    <section class="min-h-[calc(100vh-80px)] flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">

            <!-- Card -->
            <div class="bg-white rounded-lg shadow-lg p-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">Accedi</h1>
                <p class="text-sm text-gray-600 text-center mb-8">Entra nel tuo account per continuare</p>

                <!-- Form -->
                <form id="login-form">

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="email" name="email" required
                               class="form-input" placeholder="tua@email.com">
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="password" name="password" required
                               class="form-input" placeholder="••••••••">
                    </div>

                    <!-- Messaggi errore/successo -->
                    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded">
                    </div>

                    <button type="submit" class="submit-btn">Accedi</button>

                </form>

                <!-- Separatore -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Non hai un account?</span>
                    </div>
                </div>

                <!-- Link registrazione -->
                <a href="register.html"
                   class="w-full inline-flex items-center justify-center px-4 py-2 border-2 border-gray-300 rounded text-gray-700 hover:border-red-500 hover:text-red-500 font-medium transition">
                    Crea un account
                </a>

            </div>

            <!-- Link dimenticata password (placeholder) -->
            <div class="text-center mt-6">
                <a href="#" class="text-sm text-gray-600 hover:text-red-500 transition">
                    Password dimenticata?
                </a>
            </div>

        </div>
    </section>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // Validazione client
            if (!email || !password) {
                errorMsg.textContent = 'Inserisci email e password.';
                errorMsg.classList.remove('hidden');
                return;
            }

            // Login
            const result = authLogin(email, password);

            if (result.ok) {
                // Redirect alla pagina di provenienza o alla home
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect') || 'index.html';
                window.location.href = redirect;
            } else {
                errorMsg.textContent = result.error;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
