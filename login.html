<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Events InfoSardinya</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="supabaseClient.js"></script>
    <script src="auth.js"></script>
    <script src="navbar.js"></script>

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --color-primary: #151515;
            --color-accent-red: #FF2122;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.375rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent-red);
            box-shadow: 0 0 0 3px rgba(255, 33, 34, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--color-accent-red);
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #e01f20;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 33, 34, 0.3);
        }

        .submit-btn:disabled {
            background: #aaa;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .google-btn {
            width: 100%;
            padding: 0.875rem;
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .google-btn:hover {
            border-color: #4285f4;
            background: #f8f9ff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.2);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* Animazione fade-in per il messaggio di benvenuto */
        .welcome-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Spunta verde animata */
        .checkmark-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: scaleIn 0.4s ease-out forwards;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .checkmark-icon {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.5s 0.3s ease-out forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* Loader puntini */
        .welcome-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin: 0 3px;
            border-radius: 50%;
            background: #22c55e;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .welcome-dots span:nth-child(2) { animation-delay: 0.2s; }
        .welcome-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50">

    <div id="site-navbar"></div>

    <script>
        // Se torniamo da Google OAuth, NON fare redirect automatico
        // — mostriamo prima la schermata di benvenuto
        var _isGoogleReturn = sessionStorage.getItem('google_oauth_pending') === '1';
        if (!_isGoogleReturn) {
            authRedirectIfLoggedIn('index.html');
        }
    </script>

    <!-- PAGE CONTAINER -->
    <section class="min-h-[calc(100vh-80px)] flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">

            <!-- Card -->
            <div class="bg-white rounded-lg shadow-lg p-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">Accedi</h1>
                <p class="text-sm text-gray-600 text-center mb-8">Entra nel tuo account per continuare</p>

                <!-- Messaggio email verificata -->
                <div id="verified-msg" class="hidden mb-4 p-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded">
                    Email verificata con successo! Ora puoi accedere.
                </div>

                <!-- Bottone Google -->
                <button type="button" class="google-btn" onclick="handleGoogleLogin()">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Accedi con Google
                </button>

                <!-- Separatore -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">oppure con email</span>
                    </div>
                </div>

                <!-- Form -->
                <form id="login-form">

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="email" name="email" required
                               class="form-input" placeholder="tua@email.com">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="password" name="password" required
                               class="form-input" placeholder="••••••••">
                    </div>

                    <div class="mb-6 text-right">
                        <a href="recupero-password.html" class="text-sm text-red-500 hover:text-red-700 font-medium transition">
                            Hai dimenticato la password?
                        </a>
                    </div>

                    <!-- Messaggi errore -->
                    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded">
                    </div>

                    <button type="submit" id="submit-btn" class="submit-btn">Accedi</button>

                </form>

                <!-- Separatore -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Non hai un account?</span>
                    </div>
                </div>

                <!-- Link registrazione -->
                <a href="register.html"
                   class="w-full inline-flex items-center justify-center px-4 py-2 border-2 border-gray-300 rounded text-gray-700 hover:border-red-500 hover:text-red-500 font-medium transition">
                    Crea un account
                </a>

            </div>

            <!-- Messaggio di benvenuto (nascosto di default) -->
            <div id="welcome-container" class="hidden bg-white rounded-lg shadow-lg p-8 text-center welcome-fade-in">
                <div class="checkmark-circle">
                    <svg class="checkmark-icon" viewBox="0 0 24 24">
                        <polyline points="6 12 10 16 18 8"></polyline>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Accesso completato!</h2>
                <p class="text-lg text-gray-600 mb-4">Benvenuto/a, <span id="welcome-user-name" class="font-semibold text-green-600"></span></p>
                <p class="text-sm text-gray-400 mb-3">Reindirizzamento in corso</p>
                <div class="welcome-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

        </div>
    </section>

    <script>
        // Mostra messaggio se email appena verificata
        var params = new URLSearchParams(window.location.search);
        if (params.get('verified') === '1') {
            document.getElementById('verified-msg').classList.remove('hidden');
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Gestione ritorno da Google OAuth — mostra schermata di benvenuto
        // Il flag è stato impostato in handleGoogleLogin() prima del redirect a Google
        if (sessionStorage.getItem('google_oauth_pending') === '1') {
            // NON pulire l'URL qui — Supabase deve prima leggere il token dal fragment hash
            // Attendi che Supabase processi il token e confermi la sessione
            supabaseClient.auth.onAuthStateChange(function(event, session) {
                if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session && session.user) {
                    // Sessione confermata — rimuovi il flag
                    sessionStorage.removeItem('google_oauth_pending');

                    var user = session.user;
                    var userName = (user.user_metadata && user.user_metadata.full_name)
                        || (user.user_metadata && user.user_metadata.nome)
                        || user.email.split('@')[0];

                    // Nascondi il form e mostra il benvenuto (stessa logica del login email)
                    var formCard = document.querySelector('.bg-white.rounded-lg.shadow-lg.p-8');
                    if (formCard) formCard.style.display = 'none';

                    var welcomeEl = document.getElementById('welcome-container');
                    document.getElementById('welcome-user-name').textContent = userName;
                    welcomeEl.classList.remove('hidden');

                    // Pulisci l'URL solo DOPO che Supabase ha processato il token
                    window.history.replaceState({}, document.title, window.location.pathname);

                    // Redirect dopo 2.5 secondi, come per il login email
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 2500);
                }
            });
        }

        // Login con Google
        async function handleGoogleLogin() {
            // Flag per riconoscere il ritorno da Google OAuth al reload della pagina
            sessionStorage.setItem('google_oauth_pending', '1');
            var result = await authLoginWithGoogle();
            if (!result.ok) {
                sessionStorage.removeItem('google_oauth_pending');
                var errorMsg = document.getElementById('error-msg');
                errorMsg.textContent = result.error;
                errorMsg.classList.remove('hidden');
            }
        }

        // Login con email
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('error-msg');
            var submitBtn = document.getElementById('submit-btn');

            if (!email || !password) {
                errorMsg.textContent = 'Inserisci email e password.';
                errorMsg.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Accesso in corso...';

            var result = await authLogin(email, password);

            if (result.ok) {
                // Mostra schermata di benvenuto prima del redirect
                var redirect = params.get('redirect') || 'index.html';
                var user = authGetCurrentUser();
                var userName = user ? user.nome : email.split('@')[0];

                // Nascondi la card del form e mostra il benvenuto
                document.querySelector('.bg-white.rounded-lg.shadow-lg.p-8').style.display = 'none';
                var welcomeEl = document.getElementById('welcome-container');
                document.getElementById('welcome-user-name').textContent = userName;
                welcomeEl.classList.remove('hidden');

                // Attendi 2.5 secondi prima del redirect
                setTimeout(function() {
                    window.location.href = redirect;
                }, 2500);
                return;
            } else {
                errorMsg.textContent = result.error;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Accedi';
            }
        });
    </script>

    <!-- Cookie Banner GDPR -->
    <script src="cookie-banner.js"></script>

</body>
</html>
