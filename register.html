<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - Events InfoSardinya</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="auth.js"></script>
    <script src="navbar.js"></script>

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --color-primary: #151515;
            --color-accent-red: #FF2122;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.375rem;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--color-accent-red);
            box-shadow: 0 0 0 3px rgba(255, 33, 34, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--color-accent-red);
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #e01f20;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 33, 34, 0.3);
        }

        .piano-option {
            width: 100%;
            padding: 0;
            border: none;
            background: transparent;
            cursor: pointer;
            text-align: left;
        }

        .piano-card {
            padding: 1.5rem;
            border: 2px solid #ddd;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .piano-card:hover {
            border-color: var(--color-accent-red);
            box-shadow: 0 2px 8px rgba(255, 33, 34, 0.1);
        }

        .piano-card.active {
            border-color: var(--color-accent-red);
            background: rgba(255, 33, 34, 0.05);
        }

        .piano-info {
            flex: 1;
        }

        .piano-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: var(--color-primary);
        }

        .piano-price {
            color: var(--color-accent-red);
            font-weight: 600;
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .piano-desc {
            color: #686868;
            font-size: 0.8rem;
        }

        .piano-radio {
            flex-shrink: 0;
            margin-left: 1rem;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div id="site-navbar"></div>

    <script>
        authRedirectIfLoggedIn('index.html');
    </script>

    <!-- PAGE CONTAINER -->
    <section class="min-h-[calc(100vh-80px)] py-12 px-4">
        <div class="w-full max-w-md mx-auto">

            <!-- Card -->
            <div class="bg-white rounded-lg shadow-lg p-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">Crea un account</h1>
                <p class="text-sm text-gray-600 text-center mb-8">Unisciti a migliaia di organizzatori di eventi</p>

                <!-- Form -->
                <form id="register-form">

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nome completo</label>
                        <input type="text" id="nome" name="nome" required
                               class="form-input" placeholder="Mario Rossi">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="email" name="email" required
                               class="form-input" placeholder="tua@email.com">
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="password" name="password" required
                               class="form-input" placeholder="••••••••">
                    </div>

                    <!-- Piano -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-4">Il tuo piano</label>
                        <div class="piano-card active">
                            <div class="piano-info">
                                <div class="piano-title">Starter</div>
                                <div class="piano-price">Gratis</div>
                                <div class="piano-desc">Pubblica i tuoi eventi gratuitamente</div>
                            </div>
                            <div class="piano-radio">
                                <div class="w-5 h-5 rounded-full border-2 border-red-500 flex items-center justify-center">
                                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                                </div>
                            </div>
                        </div>
                        <input type="hidden" id="piano" name="piano" value="starter">
                    </div>

                    <!-- Messaggi errore -->
                    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded">
                    </div>

                    <button type="submit" class="submit-btn">Crea account</button>

                </form>

                <!-- Separatore -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Hai già un account?</span>
                    </div>
                </div>

                <!-- Link login -->
                <a href="login.html"
                   class="w-full inline-flex items-center justify-center px-4 py-2 border-2 border-gray-300 rounded text-gray-700 hover:border-red-500 hover:text-red-500 font-medium transition">
                    Accedi qui
                </a>

            </div>

        </div>
    </section>

    <script>
        // Submit form
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const piano = document.getElementById('piano').value;
            const errorMsg = document.getElementById('error-msg');

            // Validazione
            if (!nome || !email || !password) {
                errorMsg.textContent = 'Compila tutti i campi obbligatori.';
                errorMsg.classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'La password deve essere di almeno 6 caratteri.';
                errorMsg.classList.remove('hidden');
                return;
            }

            // Registrazione
            const result = authRegister(nome, email, password, piano);

            if (result.ok) {
                // Login automatico e redirect
                window.location.href = 'index.html';
            } else {
                errorMsg.textContent = result.error;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
